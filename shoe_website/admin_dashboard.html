<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Admin Dashboard | KYC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 6rem 2rem 2rem;
    }
    .seller-table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .seller-table th, .seller-table td {
      padding: 1.25rem 1rem;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      color: #e2e8f0;
      font-size: 0.9rem;
    }
    .seller-table th {
      background: rgba(0, 0, 0, 0.2);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: #94a3b8;
    }
    .seller-table tr:hover {
      background: rgba(255, 255, 255, 0.04);
    }
    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .status-pending { background: rgba(234, 179, 8, 0.2); color: #fde047; border: 1px solid rgba(234, 179, 8, 0.3); }
    .status-verified { background: rgba(34, 197, 94, 0.2); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.3); }
    .action-btn {
      padding: 0.4rem 1rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-approve { background: #22c55e; color: white; }
    .btn-approve:hover { background: #16a34a; }
    .btn-revoke { background: #ef4444; color: white; }
    .btn-revoke:hover { background: #dc2626; }
    
    #loginOverlay {
      position: fixed; inset: 0; background: #06070b; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: rgba(255, 255, 255, 0.03); padding: 2.5rem; border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 400px;
    }
  </style>
</head>
<body>
  <div class="bg-gradient-shift" aria-hidden="true"></div>
  <div class="bg-grid" aria-hidden="true"></div>

  <!-- Auth Overlay -->
  <div id="loginOverlay">
    <div class="login-box">
      <h2 style="margin-bottom: 0.5rem; text-align: center;">Super Admin</h2>
      <p style="color: var(--muted); text-align: center; margin-bottom: 2rem; font-size: 0.9rem;">Enter master password to access KYC panel.</p>
      <form id="adminLoginForm">
        <label class="admin-field admin-field-full">
          <span>Master Password</span>
          <input type="password" id="masterPassword" required placeholder="••••••••">
        </label>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">Access Dashboard</button>
      </form>
    </div>
  </div>

  <header class="site-header">
    <div class="header-inner" style="justify-content: space-between;">
      <a href="index.html" class="logo">DHANKOR <span style="font-weight: 300; font-size: 0.8rem; margin-color: 0.5rem; opacity: 0.7; color: #f87171;">KYC GUARD</span></a>
      <button class="btn btn-outline" id="logoutBtn" style="padding: 0.4rem 1rem; font-size: 0.8rem;">Logout</button>
    </div>
  </header>

  <main class="admin-container">
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem;">
      <div>
        <p class="tag">SELLER MANAGEMENT</p>
        <h2 style="margin: 0; font-size: 2rem;">KYC Approvals</h2>
      </div>
      <div>
        <span style="color: var(--muted); font-size: 0.9rem;">Total Registered: <strong id="totalCount" style="color: white;">0</strong></span>
      </div>
    </div>
    
    <div style="overflow-x: auto;">
      <table class="seller-table">
        <thead>
          <tr>
            <th>Shop / Store URL</th>
            <th>Owner</th>
            <th>Contact</th>
            <th>Location</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="sellerTableBody">
          <!-- Rows injected via JS -->
        </tbody>
      </table>
    </div>
  </main>

  <script src="admin_dashboard.js"></script>
</body>
</html>
